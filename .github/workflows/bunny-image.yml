name: Build & Push Server Image (GHCR)

# Builds the online server as a container image and publishes it to the GitHub
# Container Registry (GHCR) so Bunny Magic Containers can pull it via the
# built-in "GitHub Public" registry. Uses the automatic GITHUB_TOKEN — no extra
# secrets required to push.

on:
  push:
    branches: [feature/bunny-container]
    paths:
      - 'server/**'
      - 'MemKarti-cloud/apps/mobile-v2/**'
      - '.github/workflows/bunny-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # --- Export the JS bundle for self-hosted OTA, baked into the image ----
      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Export Expo OTA bundle (android)
        working-directory: MemKarti-cloud/apps/mobile-v2
        env:
          EXPO_NO_TELEMETRY: '1'
          # Must match the SERVER_URL the app talks to, so /api/manifest is reachable.
          EXPO_PUBLIC_SERVER_URL: https://mc-8p1wswn5c6.bunny.run
        run: |
          npm install --legacy-peer-deps
          npx expo export --platform android --output-dir dist
          # Bake the export into the server image build context.
          rm -rf ../../../server/ota-dist 2>/dev/null || true
          mkdir -p "$GITHUB_WORKSPACE/server/ota-dist"
          cp -r dist/* "$GITHUB_WORKSPACE/server/ota-dist/"
          echo "Exported OTA bundle:" && ls -la "$GITHUB_WORKSPACE/server/ota-dist"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/memkarti-server:latest

      # Try to flip the package to public so Bunny can pull anonymously.
      # GITHUB_TOKEN often lacks permission for personal-account package
      # visibility — if this step fails, flip it once in the GitHub UI:
      # Profile -> Packages -> memkarti-server -> Package settings -> Change visibility -> Public
      - name: Make package public (best effort)
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "visibility PATCH: %{http_code}\n" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/memkarti-server/visibility" \
            -d '{"visibility":"public"}'
